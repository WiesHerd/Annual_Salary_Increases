# Meritly Supabase local/CLI config
# Link: npm run supabase:link  (requires `npx supabase login` first)
# Push migrations: npm run db:push

project_id = "msrqcxebcrcdzorlfdiv"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = true
enable_confirmations = false
double_confirm_changes = true

[auth.email.template.recovery]
subject = "Reset your Meritly password"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.confirmation]
subject = "Confirm your Meritly account"
content_path = "./supabase/templates/confirmation.html"
